<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura de Compra · Paws Paradise</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; padding: 40px 20px; color: #333; }
        .invoice-box { max-width: 800px; margin: auto; padding: 40px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #fff; border-radius: 10px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 800; color: #2ecc71; display: flex; align-items: center; gap: 10px; }
        .invoice-details { text-align: right; }
        .invoice-details h2 { margin: 0; color: #2c3e50; font-size: 28px; }
        .invoice-details p { margin: 5px 0 0; color: #7f8c8d; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .info-box { background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .info-box h4 { margin: 0 0 15px 0; color: #2c3e50; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
        .info-box p { margin: 8px 0; font-size: 0.95rem; }

        table { width: 100%; line-height: inherit; text-align: left; border-collapse: collapse; margin-bottom: 30px; }
        table th { background: #2c3e50; color: white; padding: 12px; font-weight: 600; }
        table td { padding: 12px; border-bottom: 1px solid #eee; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .totals-box { width: 300px; margin-left: auto; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .totals-box p { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.05rem; }
        .total-final { font-size: 1.4rem !important; font-weight: 800; color: #2ecc71; border-top: 2px solid #ddd; padding-top: 10px; margin-top: 10px !important; }

        .payment-info { background: #e3f2fd; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #bbdefb; margin-top: 30px; }
        
        .actions { text-align: center; margin-top: 40px; }
        .btn-print { background: #2980b9; color: white; border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Inter'; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-print:hover { background: #1a5276; }
        .btn-home { background: #95a5a6; color: white; text-decoration: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 8px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; margin-left: 10px; }

        /* Estilos específicos para cuando se guarda en PDF / Imprime */
        @media print {
            body { background: white; padding: 0; }
            .invoice-box { box-shadow: none; border: none; padding: 0; }
            .actions { display: none; /* Oculta los botones en el PDF */ }
        }
    </style>
</head>
<body>

    <div class="invoice-box">
        <div class="header">
            <div class="logo">
                <i class="fas fa-paw"></i> Paws Paradise
            </div>
            <div class="invoice-details">
                <h2>FACTURA</h2>
                <p>Nº Pedido: <strong id="fac-numero">Cargando...</strong></p>
                <p>Fecha: <span id="fac-fecha"></span></p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <h4><i class="fas fa-user"></i> Datos del Cliente</h4>
                <p><strong>Nombre:</strong> <span id="fac-cliente"></span></p>
                <p><strong>Cédula:</strong> <span id="fac-cedula"></span></p>
                <p><strong>Email:</strong> <span id="fac-email"></span></p>
                <p><strong>Teléfono:</strong> <span id="fac-telefono"></span></p>
            </div>
            <div class="info-box">
                <h4><i class="fas fa-map-marker-alt"></i> Dirección de Envío</h4>
                <p><strong>Dirección:</strong> <span id="fac-direccion"></span></p>
                <p><strong>Ciudad:</strong> <span id="fac-ciudad"></span></p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th class="text-center">Cant.</th>
                    <th class="text-right">Precio Unit.</th>
                    <th class="text-right">Subtotal</th>
                </tr>
            </thead>
            <tbody id="fac-productos">
                </tbody>
        </table>

        <div class="totals-box">
            <p><span>Subtotal:</span> <span id="fac-subtotal">$0.00</span></p>
            <p><span>Envío:</span> <span id="fac-envio">$5.00</span></p>
            <p class="total-final"><span>Total USD:</span> <span id="fac-total">$0.00</span></p>
        </div>

        <div id="fac-pago-info" class="payment-info">
            </div>

        <div class="actions">
            <button class="btn-print" onclick="window.print()"><i class="fas fa-file-pdf"></i> Descargar PDF / Imprimir</button>
            <a href="{{ url_for('home') }}" class="btn-home"><i class="fas fa-home"></i> Volver al Inicio</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
