<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito · Paws Paradise</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <style>
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item-info h4 { margin-bottom: 5px; color: var(--text-dark); }
        .cart-item-price { color: var(--text-muted); font-size: 0.9rem; }
        .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
        .quantity-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .cart-item-subtotal { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        .btn-remove-item { background: #fee2e2; color: var(--danger); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-remove-item:hover { background: var(--danger); color: white; }
        .cart-summary { text-align: right; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-checkout { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        
        /* SOLUCIÓN AL MODAL: CSS para centrar la alerta flotante */
        .custom-confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .custom-confirm-overlay.show { opacity: 1; }
        .custom-confirm-box { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); transform: translateY(-20px); transition: transform 0.3s ease; }
        .custom-confirm-overlay.show .custom-confirm-box { transform: translateY(0); }
        .custom-confirm-box i { font-size: 3.5rem; color: var(--danger); margin-bottom: 15px; }
        .custom-confirm-box h3 { margin-bottom: 25px; color: var(--text-dark); font-weight: 600; }
        .custom-confirm-buttons { display: flex; gap: 15px; justify-content: center; }
        .btn-confirm-yes, .btn-confirm-no { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s; }
        .btn-confirm-yes { background: var(--danger); color: white; }
        .btn-confirm-yes:hover { background: #c0392b; }
        .btn-confirm-no { background: #e0e0e0; color: var(--text-dark); }
        .btn-confirm-no:hover { background: #d0d0d0; }
        .cart-empty { text-align: center; padding: 40px 0; }
        .cart-empty i { font-size: 4rem; color: #ccc; margin-bottom: 15px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('home') }}" class="logo">
                    <i class="fas fa-paw"></i>
                    <span>Paws Paradise</span>
                </a>
                <nav class="nav">
                    <button class="menu-hamburguesa" id="menu-toggle" aria-label="Abrir menú">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    <ul>
                        <li><a href="{{ url_for('home') }}">Inicio</a></li>
                        <li><a href="{{ url_for('render_page', page_name='productos') }}">Productos</a></li>
                        <li><a href="{{ url_for('render_page', page_name='servicios') }}">Servicios</a></li>
                        <li>
                            <a href="{{ url_for('render_page', page_name='carrito') }}" class="cart-link active">
                                <i class="fas fa-shopping-cart"></i>
                                <span class="cart-count">0</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-container" style="max-width: 800px; padding: 40px; background: white; border-radius: 20px; margin: 40px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                        <h2 style="margin: 0;">Tu carrito (<span id="cart-total-items">0</span> productos)</h2>
                        <button id="clear-cart" class="btn-remove-item" style="background: var(--danger); color: white; padding: 10px 20px; display: none;">
                            <i class="fas fa-trash"></i> Vaciar carrito
                        </button>
                    </div>

                    <div id="cart-items-container"></div>

                    <div id="cart-summary" class="cart-summary" style="display: none;">
                        <p>Subtotal: <span id="subtotal">$0.00</span></p>
                        <p>Envío: <span id="shipping">$5.00</span></p>
                        <h3 style="margin-top: 10px; color: var(--primary);">Total:<span id="total">$0.00</span></h3>
                        <button class="btn-checkout">Proceder al pago <i class="fas fa-arrow-right"></i></button>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
