<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · Paws Paradise</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('home') }}" class="logo">
                    <i class="fas fa-paw"></i>
                    <span>Paws Paradise</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-container">
                    <div class="auth-header">
                        <i class="fas fa-paw"></i>
                        <h1>Crea tu cuenta</h1>
                        <p>Únete a nuestra comunidad</p>
                    </div>

                    <form id="registro-form" class="auth-form">

                        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <label for="nombre-registro"><i class="fas fa-user"></i> Nombre</label>
                                <input type="text" id="nombre-registro" required placeholder="Ej: Juan">
                            </div>
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <label for="apellido-registro"><i class="fas fa-user"></i> Apellido</label>
                                <input type="text" id="apellido-registro" required placeholder="Ej: Pérez">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="cedula-registro"><i class="fas fa-id-card"></i> Cédula de Identidad</label>
                            <input type="text" id="cedula-registro" required placeholder="Ej: V-12345678">
                        </div>

                        <div class="form-group">
                            <label for="email-registro"><i class="fas fa-envelope"></i> Correo electrónico</label>
                            <input type="email" id="email-registro" required placeholder="ejemplo@correo.com">
                        </div>
                        <div class="form-group">
                            <label for="telefono-registro"><i class="fas fa-phone"></i> Teléfono</label>
                            <input type="tel" id="telefono-registro" required minlength="10" maxlength="15" placeholder="Ej: 04141234567">
                        </div>
                        <div class="form-group">
                            <label for="password-registro"><i class="fas fa-lock"></i> Contraseña</label>
                            <input type="password" id="password-registro" required placeholder="Mínimo 8 caracteres">
                            
                            <div class="password-strength-container">
                                <div id="strength-bar" class="strength-bar"></div>
                                <span id="strength-text" class="strength-text">Seguridad: Ninguna</span>
                            </div>
                            <ul class="password-reqs">
                                <li id="req-length" class="req-unmet"><i class="fas fa-times-circle"></i> Mínimo 8 caracteres</li>
                                <li id="req-upper" class="req-unmet"><i class="fas fa-times-circle"></i> Al menos una mayúscula</li>
                                <li id="req-lower" class="req-unmet"><i class="fas fa-times-circle"></i> Al menos una minúscula</li>
                                <li id="req-number" class="req-unmet"><i class="fas fa-times-circle"></i> Al menos un número</li>
                                <li id="req-special" class="req-unmet"><i class="fas fa-times-circle"></i> Al menos un carácter especial (@$!%*?&)</li>
                            </ul>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password"><i class="fas fa-lock"></i> Confirmar Contraseña</label>
                            <input type="password" id="confirm-password" required placeholder="Repite tu contraseña">
                        </div>
                        
                        <button type="submit" id="btn-registrar" class="btn-auth" disabled style="opacity: 0.5; cursor: not-allowed;">Registrarse</button>
                    </form>
                    <p class="auth-redirect">¿Ya tienes cuenta? <a href="{{ url_for('render_page', page_name='login') }}">Inicia sesión aquí</a></p>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
