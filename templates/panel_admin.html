<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración · Paws Paradise</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 80px); background: #f8f9fa; padding-top: 80px; }
        .admin-sidebar { width: 250px; background: white; border-right: 1px solid #eee; padding: 30px 20px; }
        .admin-sidebar h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; color: #7f8c8d; }
        .admin-menu { list-style: none; padding: 0; margin: 0; }
        .admin-menu li { margin-bottom: 10px; }
        .admin-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; color: var(--text-dark); text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.3s; cursor: pointer; }
        .admin-menu a:hover, .admin-menu a.active { background: var(--primary); color: white; }
        
        .admin-content { flex: 1; padding: 40px; overflow-y: auto; }
        .admin-header-page { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-header-page h2 { margin: 0; color: var(--text-dark); }
        
        .admin-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); padding: 25px; }
        table.admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table.admin-table th { background: #f8f9fa; color: #2c3e50; padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
        table.admin-table td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .prod-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #eee; }
        .stock-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .stock-ok { background: #e8f8f5; color: #27ae60; }
        .stock-low { background: #fcf3cf; color: #f39c12; }
        .stock-out { background: #fee2e2; color: #e74c3c; }
        
        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 5px; transition: 0.2s; font-size: 1.1rem; }
        .btn-edit { color: #3498db; } .btn-edit:hover { background: #ebf5fb; }
        .btn-delete { color: #e74c3c; } .btn-delete:hover { background: #fdedec; }
        
        /* Estilos para el select de estado de pedidos */
        .select-estado { padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-weight: 600; outline: none; }
        .est-pendiente { color: #e67e22; background: #fdf2e9; }
        .est-envio { color: #3498db; background: #ebf5fb; }
        .est-recibido { color: #27ae60; background: #e8f8f5; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('home') }}" class="logo">
                    <i class="fas fa-paw"></i>
                    <span>Paws Paradise</span>
                </a>
                <nav class="nav">
                    <ul>
                        <li><a href="{{ url_for('render_page', page_name='productos') }}">Ver Tienda</a></li>
                        <li><a href="#" style="color: var(--danger);" onclick="cerrarSesion(); return false;"><i class="fas fa-sign-out-alt"></i> Salir</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h3>Gestión</h3>
            <ul class="admin-menu">
                <li><a id="tab-btn-inventario" class="active" onclick="cambiarTabAdmin('inventario')"><i class="fas fa-box-open"></i> Inventario</a></li>
                <li><a id="tab-btn-pedidos" onclick="cambiarTabAdmin('pedidos')"><i class="fas fa-shopping-bag"></i> Pedidos</a></li>
            </ul>
        </aside>

        <main class="admin-content">
            <div id="seccion-inventario">
                <div class="admin-header-page">
                    <h2><i class="fas fa-boxes"></i> Inventario de Productos</h2>
                    <button class="btn-auth" style="padding: 10px 20px; font-size: 1rem;" onclick="abrirModalProducto()">
                        <i class="fas fa-plus"></i> Añadir Producto
                    </button>
                </div>
                <div class="admin-card">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th style="text-align: right;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-productos-lista">
                            <tr><td colspan="6" style="text-align: center; padding: 30px;"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="seccion-pedidos" style="display: none;">
                <div class="admin-header-page">
                    <h2><i class="fas fa-shopping-bag"></i> Gestión de Pedidos</h2>
                </div>
                <div class="admin-card">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID Pedido</th>
                                <th>Cliente / Cédula</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Método</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="admin-pedidos-lista">
                            <tr><td colspan="6" style="text-align: center; padding: 30px;"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-producto" class="custom-confirm-overlay" style="display: none; align-items: center; justify-content: center;">
        <div class="custom-confirm-box" style="max-width: 800px; width: 95%; text-align: left; padding: 25px 35px; transform: translateY(0);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <h3 id="modal-titulo" style="margin: 0; color: var(--primary); font-size: 1.3rem;"><i class="fas fa-box"></i> Nuevo Producto</h3>
                <button onclick="cerrarModalProducto()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #95a5a6;"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="form-producto" enctype="multipart/form-data">
                <input type="hidden" id="prod-id" value="">
                <div style="display: flex; gap: 20px; margin-bottom: 12px;">
                    <div style="flex: 2;">
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Nombre del Producto *</label>
                        <input type="text" id="prod-nombre" required placeholder="Ej: Croquetas" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Categoría *</label>
                        <select id="prod-categoria" required style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
                            <option value="Alimento">Alimento</option>
                            <option value="Accesorios">Accesorios</option>
                            <option value="Salud">Salud e Higiene</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; gap: 20px; margin-bottom: 12px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Precio ($) *</label>
                        <input type="number" id="prod-precio" step="0.01" min="0" required placeholder="0.00" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Stock Físico *</label>
                        <input type="number" id="prod-stock" min="0" required placeholder="0" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
                    </div>
                    <div style="flex: 2;">
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Imagen del Producto</label>
                        <input type="file" id="prod-imagen" accept="image/*" style="width: 100%; padding: 7px; border: 2px solid #ddd; border-radius: 5px; background: white;">
                        <input type="hidden" id="prod-imagen-actual" value="">
                        <small id="texto-imagen-actual" style="color: var(--primary); display: none; margin-top: 5px; font-weight: 500;"><i class="fas fa-check"></i> Imagen cargada.</small>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">Descripción corta</label>
                    <textarea id="prod-descripcion" rows="2" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; resize: none; font-family: inherit;"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 15px;">
                    <button type="button" class="btn-confirm-no" onclick="cerrarModalProducto()">Cancelar</button>
                    <button type="submit" class="btn-confirm-yes" style="background: var(--primary);">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
